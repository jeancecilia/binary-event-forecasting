# Network policies for replay mode

# Deny all outbound network traffic during replay
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: replay-network-isolation
spec:
  podSelector:
    matchLabels:
      mode: replay
  policyTypes:
    - Egress
  egress:
    # Allow only localhost traffic (AF_UNIX not affected by NetworkPolicy)
    - to:
        - ipBlock:
            cidr: 127.0.0.0/8
    # Allow DNS for nothing
