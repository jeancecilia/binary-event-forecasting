name: Verification CI

on:
  pull_request:

jobs:
  verify-all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: astral-sh/setup-uv@v2
      - run: uv sync
      - run: uv run python scripts/validate_requirements.py
      - run: cargo test --workspace


