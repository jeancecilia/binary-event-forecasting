name: Replay CI

on:
  pull_request:

jobs:
  deterministic-replay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build core engine
        run: cargo build --release --bin core-engine
      - name: Deterministic replay test
        run: cargo run --bin core-engine -- replay --trace data/traces/golden --verify

  container-replay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Container replay test
        run: |
          docker build -t binary-event-research-core -f deploy/containers/core-engine.Dockerfile .
          docker run --rm binary-event-research-core \
            --config /app/config/core.toml \
            replay --trace /app/data/traces/golden --verify
