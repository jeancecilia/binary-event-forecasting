name: Replay CI

on:
  pull_request:

jobs:
  deterministic-replay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build core engine
        run: cargo build --release --bin core-engine
      - name: Deterministic replay test
        run: |
          echo "Deterministic replay requires a golden trace fixture (Milestone 1)."
          echo "Run: cargo run --bin core-engine -- replay --trace data/traces/golden --verify"
          exit 1

  network-isolation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Network isolation test
        run: |
          echo "Network isolation requires seccomp profile application in container (Milestone 1)."
          echo "See deploy/seccomp/replay-profile.json"
          exit 1
