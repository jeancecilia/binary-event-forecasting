name: Architecture CI

on:
  push:
    paths:
      - '**/Cargo.toml'
      - '**/pyproject.toml'
      - 'docs/specification/**'
      - 'verification/**'
      - '.github/workflows/architecture.yml'
  pull_request:

jobs:
  requirement-validator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v2
      - run: uv sync
      - run: uv run python scripts/validate_requirements.py

  dependency-boundaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Check dependency boundaries
        run: |
          echo "Checking dependency boundaries..."
          python devtools/dependency-boundary-checker/main.py

  forbidden-patterns:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for prohibited patterns (SEC-003)
        run: |
          echo "Scanning for private-key libraries..."
          ! grep -rq "ed25519-dalek\|secp256k1\|solana-sdk\|ethers" crates/ services/ --include="*.rs" || { echo "FAIL: Private-key library detected"; exit 1; }
          echo "Scanning for payment/deposit code..."
          ! grep -rq "deposit\|withdraw\|payment\|stripe\|paypal" crates/ services/ --include="*.rs" || { echo "FAIL: Payment/deposit code detected"; exit 1; }
          echo "Scanning for real-service adapters..."
          ! grep -rq "binance\|kraken\|coinbase\|polymarket\|kalshi\|metaculus" crates/ services/ --include="*.rs" || { echo "FAIL: Real-service adapter detected"; exit 1; }
          echo "Forbidden pattern scan passed."
