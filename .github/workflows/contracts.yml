name: Contracts CI

on:
  push:
    paths:
      - 'contracts/**'
      - 'crates/protocol/**'
      - 'python-packages/contracts-py/**'
      - '.github/workflows/contracts.yml'
  pull_request:

jobs:
  validate-schemas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON schemas
        run: |
          for schema in contracts/schemas/*.json; do
            echo "Validating $schema..."
            python -m json.tool "$schema" > /dev/null || { echo "FAIL: Invalid JSON in $schema"; exit 1; }
          done


