name: Contracts CI

on:
  push:
    paths:
      - 'contracts/**'
      - 'crates/protocol/**'
      - 'python-packages/contracts-py/**'
      - '.github/workflows/contracts.yml'
  pull_request:

jobs:
  validate-schemas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON schemas
        run: |
          for schema in contracts/schemas/*.json; do
            echo "Validating $schema..."
            python -m json.tool "$schema" > /dev/null || { echo "FAIL: Invalid JSON in $schema"; exit 1; }
          done

  cross-language-hash:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: astral-sh/setup-uv@v2
      - run: uv sync
      - name: Cross-language hash verification (PENDING)
        run: |
          echo "WARNING: Cross-language golden vector tests require contract implementation (Milestone 2)."
          echo "Rust canonicalization is implemented; Python canonicalizer pending."
          echo "Failing step to indicate pending status, but continue-on-error is true."
          exit 1

  golden-vectors:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: astral-sh/setup-uv@v2
      - run: uv sync
      - name: Golden vector tests (PENDING)
        run: |
          echo "WARNING: Golden vector tests require cross-language hash equivalence (Milestone 2)."
          echo "Failing step to indicate pending status, but continue-on-error is true."
          exit 1
