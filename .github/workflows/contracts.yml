name: Contracts CI

on:
  push:
    paths:
      - 'contracts/**'
      - 'crates/protocol/**'
      - 'python-packages/contracts-py/**'
      - '.github/workflows/contracts.yml'
  pull_request:

jobs:
  validate-schemas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v2
      - run: uv sync
      - run: |
          for schema in contracts/schemas/*.json; do
            echo "Validating $schema..."
            python -m json.tool "$schema" > /dev/null
          done

  cross-language-hash:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: astral-sh/setup-uv@v2
      - run: uv sync
      - run: uv run python scripts/validate_contracts.py

  golden-vectors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: astral-sh/setup-uv@v2
      - run: uv sync
      - run: echo "Golden vector tests — Milestone 2"
